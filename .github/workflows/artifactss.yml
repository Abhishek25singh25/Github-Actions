name: artifact-jobs

on: workflow_dispatch

jobs:
  job1:
    runs-on: ubuntu-latest
    steps:
      - name: create file
        run: echo "hello from job1" > file.txt

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-file
          path: file.txt

  job2:
    needs: job1
    runs-on: ubuntu-latest
    steps:
      - name: download artifact
        uses: actions/download-artifact@v4
        with:
          name: my-file

      - name: print file
        run: cat file.txt