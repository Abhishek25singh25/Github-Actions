name: Pr-lifecycle

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

jobs:
  lifecycle:
    runs-on: ubuntu-latest

    steps:
      - name: Print event
        run: echo "The event type is:${{ github.event.action }}"

      - name: Print PR title
        run: echo "The PR title is:${{ github.event.pull_request.title }}"

      - name: Print PR author
        run: echo "The PR author is:${{ github.event.pull_request.user.login }}"

      - name: Print source and target branch
        run: |
          echo "The source branch is: ${{ github.head_ref }}"
          echo "The target branch is: ${{ github.base_ref }}"

      - name: PR is merged
        if: github.event.pull_request.merged == true
        run: echo "This PR was officially merged into ${{ github.base_ref }}"