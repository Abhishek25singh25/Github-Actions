name: CI pipeline 

on:
  workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Build
        run: echo "Building a project"
        
  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: test
        run: echo "Testing the pipeline"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: deploy
        run: echo "deployed"        
       
