name: Environment Task
on:
  workflow_dispatch
env:
  APP_Name: myapp
    
jobs :
    env-demo:
        runs-on: ubuntu-latest

        env:
            ENVIRONMENT: staging

        steps:
          - name: Print variables
            env:
                version: 1.0.o
            run: |
              echo "App Name: $APP_NAME"
              echo "Environment: $ENVIRONMENT"
              echo "Version: $VERSION"
              echo "Commit SHA: ${{ github.sha }}"
              echo "Triggered by: ${{ github.actor }}"    



