name: Docker-publish

on:
  push:
    branches:
      - main

jobs:
  docker-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t my-app:v1 -f .github/workflows/Dockerfile .

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Tag Docker image
        run: docker tag my-app:v1 ${{ secrets.DOCKER_USERNAME }}/github-actions-practice:latest

      - name: Tag image with commit SHA
        run: docker tag my-app:v1 ${{ secrets.DOCKER_USERNAME }}/github-actions-practice:sha-${{ github.sha }}

      - name: Push Docker images
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/github-actions-practice:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/github-actions-practice:sha-${{ github.sha }}