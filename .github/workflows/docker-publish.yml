name: Docker-publish
on:
  push:
    branches: [main]

jobs:
  docker-push:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: build the image
        run: docker build -t my-app:v1 -f .github/workflows/Dockerfile .

      - name: Docker login and push
        uses: docker/login-action@v3
        with:
            username: ${{secrets.DOCKER_USERNAME}}
            password: ${{secrets.DOCKER_TOKEN}}

      - name: Tag the docker image
        run: docker tag my-app:v1 ${{secrets.DOCKER_USERNAME}}/GITHUB-ACTIONS:latest
        
      - name: Tag commit with sha
        run: docker tag my-app:v1 ${{secrets.DOCKER_USERNAME}}/GITHUB-ACTIONS:sha-${{github.sha}}

      - name: Docker push
        run: |
          docker push ${{secrets.DOCKER_USERNAME}}/GITHUB-ACTIONS:latest
          docker push ${{secrets.DOCKER_USERNAME}}/GITHUB-ACTIONS:sha-${{github.sha}}

