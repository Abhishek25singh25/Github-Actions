name: Artifacts

on:
  push:
    branches: [main]

jobs:
  generate-artifacts:
    runs-on: ubuntu-latest
    steps:
        - name: Checkout Repository
          uses: actions/checkout@v4

        - name: Generate a report file
          run: |
            echo "CI test report" > report.txt
            echo "Pipeline tested succesfully" > report.txt

        - name: upload artifacts
          uses: actions/upload-artifact@v4
          with:
            name: ci-report
            path: report.txt


