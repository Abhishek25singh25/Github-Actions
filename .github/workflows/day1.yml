name: Day-1-Practice

on:
  workflow_dispatch

jobs:
  print-hello-name:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4

      - name: Print message
        run: echo "Hello from github actions"

      - name: Github repo
        run: |
          echo "Repository Name: ${{ github.event.repository.name }}"



