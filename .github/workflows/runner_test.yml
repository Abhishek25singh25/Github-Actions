name: Runner Test

on:
  workflow_dispatch
jobs:
  ubuntu-job:
    runs-on: ubuntu-latest

    steps:
      - name: Print Runner Info
        run: |
          echo "OS Name: $RUNNER_OS"
          hostname
          whoami

  windows-job:
    runs-on: windows-latest

    steps:
      - name: Print Runner Info
        run: |
          echo "OS Name: $env:RUNNER_OS"
          hostname
          whoami

  macos-job:
    runs-on: macos-latest

    steps:
      - name: Print Runner Info
        run: |
          echo "OS Name: $RUNNER_OS"
          hostname
          whoami